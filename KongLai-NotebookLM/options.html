<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>空来Ai-NotebookLM辅助器设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div>
        <p class="eyebrow" data-i18n="common.appName"></p>
        <h1 data-i18n="options.heroTitle"></h1>
        <p class="hero-copy" data-i18n="options.heroDesc"></p>
      </div>
      <div class="hero-actions">
        <label class="locale-inline">
          <span data-i18n="options.locale"></span>
          <select id="localeSelect" aria-label="Language"></select>
        </label>
        <button id="saveRule" class="primary-button" type="button" data-i18n="options.saveRule"></button>
        <button id="runNow" class="secondary-button" type="button" data-i18n="options.runNow"></button>
        <button id="openNotebook" class="secondary-button" type="button" data-i18n="options.openNotebook"></button>
      </div>
    </section>

    <section class="layout-grid">
      <article class="panel">
        <h2 data-i18n="options.sectionRule"></h2>
        <div class="field-grid">
          <label class="toggle-row full-width">
            <input id="enabled" type="checkbox">
            <span data-i18n="options.enabled"></span>
          </label>

          <label>
            <span data-i18n="options.intervalMinutes"></span>
            <input id="intervalMinutes" type="number" min="5" max="1440" step="1">
          </label>

          <div class="full-width">
            <div class="rule-header">
              <span data-i18n="options.ruleGroupTitle"></span>
              <button id="addRuleRow" class="secondary-button" type="button" data-i18n="options.addRuleRow"></button>
            </div>
            <ul id="ruleRows" class="rule-rows">
              <li class="empty-log" data-i18n="options.rowEmpty"></li>
            </ul>
            <textarea id="targetLines" class="hidden-field" rows="2" spellcheck="false"></textarea>
          </div>

          <label>
            <span data-i18n="options.refreshLabel"></span>
            <input id="refreshLabel" type="text">
          </label>

          <div class="full-width import-row">
            <div class="import-actions">
              <button id="fetchNotebooks" class="secondary-button" type="button" data-i18n="options.fetchNotebooks"></button>
              <button id="appendNotebooks" class="secondary-button" type="button" data-i18n="options.appendSelectedRules"></button>
              <button id="appendSourcesForSelected" class="secondary-button" type="button" data-i18n="options.appendSelectedSource"></button>
            </div>
            <div class="picker-head">
              <label for="notebookSearch" data-i18n="options.notebookPickerTitle"></label>
              <span id="pickerSelectionCount" class="picker-count"></span>
            </div>
            <div class="picker-toolbar">
              <input id="notebookSearch" type="text" data-i18n-placeholder="options.notebookSearchPlaceholder">
              <button id="selectAllVisible" class="secondary-button" type="button" data-i18n="options.selectAllVisible"></button>
              <button id="clearSelection" class="secondary-button" type="button" data-i18n="options.clearSelection"></button>
            </div>
            <div class="picker-actions">
              <button id="addSelectedFavorites" class="secondary-button" type="button" data-i18n="options.addSelectedFavorites"></button>
              <button id="removeSelectedFavorites" class="secondary-button" type="button" data-i18n="options.removeSelectedFavorites"></button>
              <span id="favoritesCount" class="picker-count"></span>
            </div>
            <div id="notebookPicker" class="notebook-picker" role="listbox" aria-multiselectable="true"></div>
            <p class="helper-copy" data-i18n="options.pickerHint"></p>
          </div>
        </div>
      </article>

      <article class="panel">
        <h2 data-i18n="options.sectionRuntime"></h2>
        <div class="meta-grid">
          <div>
            <span class="meta-label" data-i18n="options.currentState"></span>
            <strong id="runtimeResult"></strong>
          </div>
          <div>
            <span class="meta-label" data-i18n="options.lastRun"></span>
            <strong id="runtimeLastRun"></strong>
          </div>
          <div>
            <span class="meta-label" data-i18n="options.lastSuccess"></span>
            <strong id="runtimeLastSuccess"></strong>
          </div>
          <div>
            <span class="meta-label" data-i18n="options.nextRun"></span>
            <strong id="runtimeNextRun"></strong>
          </div>
        </div>
        <p id="runtimeMessage" class="helper-copy"></p>
      </article>

      <article class="panel wide-panel">
        <h2 data-i18n="options.sectionLogs"></h2>
        <ul id="logList" class="log-list">
          <li class="empty-log" data-i18n="options.logsEmpty"></li>
        </ul>
        <div class="log-pager">
          <button id="logPrevPage" class="secondary-button" type="button" data-i18n="options.logsPrev"></button>
          <span id="logPageInfo"></span>
          <button id="logNextPage" class="secondary-button" type="button" data-i18n="options.logsNext"></button>
        </div>
      </article>

      <article class="panel wide-panel">
        <h2 data-i18n="options.sectionGuide"></h2>
        <ol class="usage-list">
          <li data-i18n="options.guide1"></li>
          <li data-i18n="options.guide2"></li>
          <li data-i18n="options.guide3"></li>
          <li data-i18n="options.guide4"></li>
        </ol>
      </article>
    </section>

    <section class="status-bar">
      <span id="formStatus"></span>
      <span id="buildInfo" class="build-info"></span>
    </section>
  </main>
  <script type="module" src="options.js"></script>
</body>
</html>
