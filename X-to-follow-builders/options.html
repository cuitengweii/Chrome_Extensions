<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>空来Ai-X日报账号采集器 · 管理中心</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #eef2ff;
      --muted: #98a2b3;
      --line: #2a3140;
      --primary: #5dd62c;
      --primary-hover: #4fbd25;
      --danger: #3a1515;
      --danger-text: #ff9a9a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #1b222f 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15, 17, 21, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar h1 {
      margin: 0;
      font-size: 22px;
      color: var(--primary);
    }
    .status {
      font-size: 12px;
      color: var(--primary);
      white-space: pre-wrap;
      max-width: 45%;
      text-align: right;
    }
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
      padding: 16px;
      min-height: calc(100vh - 64px);
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }
    .panel-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: nowrap;
      overflow: hidden;
    }
    .panel h2 {
      margin: 0;
      font-size: 14px;
      color: var(--primary);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .create-btn {
      border: 1px solid var(--line);
      background: #10141c;
      color: var(--primary);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      flex: 0 0 auto;
      width: auto;
    }
    .create-btn:hover {
      border-color: var(--primary);
      background: rgba(93, 214, 44, 0.1);
    }
    .pool-list {
      max-height: calc(100vh - 180px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #10141c;
    }
    .pool-item {
      padding: 8px 10px;
      border-bottom: 1px solid #1f2634;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .pool-item:last-child { border-bottom: none; }
    .pool-item.active {
      background: rgba(93, 214, 44, 0.12);
      color: var(--primary);
    }
    .pool-label {
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .pool-row-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .icon-btn {
      width: 28px;
      height: 28px;
      border: 1px solid #2a3140;
      background: #121824;
      color: #b5c4e5;
      border-radius: 7px;
      padding: 0;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      white-space: nowrap;
    }
    .icon-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .icon-btn.danger {
      background: var(--danger);
      color: var(--danger-text);
      border-color: #5d2525;
    }
    .icon-btn.danger:hover {
      border-color: #ff6b6b;
    }
    .pool-count {
      width: 30px;
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .pool-hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 150px 160px;
      gap: 8px;
      margin-bottom: 10px;
    }
    .write-diagnostics {
      border: 1px solid #263046;
      border-radius: 10px;
      background: #111925;
      padding: 8px 10px;
      margin-bottom: 10px;
    }
    .write-diagnostics-title {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .write-diagnostics-body {
      font-size: 12px;
      line-height: 1.45;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .write-diagnostics-body.error {
      color: #ff9a9a;
    }
    .bulk-toolbar {
      display: grid;
      grid-template-columns: auto 1fr 170px 100px 90px;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }
    .bulk-toolbar .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .bulk-toolbar .selected-count {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .bulk-toolbar .selected-count strong {
      color: var(--primary);
      font-weight: 700;
    }
    input, select, button {
      width: 100%;
      border: 1px solid var(--line);
      background: #10141c;
      color: var(--text);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 13px;
    }
    input:focus, select:focus, button:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(93, 214, 44, 0.2);
    }
    button { cursor: pointer; }
    button.primary {
      background: var(--primary);
      color: #07150a;
      font-weight: 700;
      border-color: var(--primary);
    }
    button.primary:hover { background: var(--primary-hover); }
    .account-list {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #10141c;
      max-height: calc(100vh - 220px);
      overflow: auto;
      padding: 8px;
      display: grid;
      gap: 8px;
    }
    .account-card {
      border: 1px solid #222b3a;
      border-radius: 10px;
      padding: 8px;
      display: grid;
      grid-template-columns: 20px 48px 1fr;
      gap: 8px;
      align-items: center;
    }
    .row-check {
      width: 14px;
      height: 14px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid #2f3a4d;
      object-fit: cover;
      background: #0f141d;
    }
    .avatar-fallback {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid #2f3a4d;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--muted);
      background: #0f141d;
    }
    .meta .name {
      font-size: 13px;
      font-weight: 700;
      color: #e9eeff;
    }
    .meta .sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      word-break: break-all;
    }
    .meta .link {
      font-size: 11px;
      color: #9ecbff;
      text-decoration: none;
      word-break: break-all;
      display: inline-block;
      margin-top: 3px;
    }
    .actions {
      margin-top: 6px;
      display: grid;
      grid-template-columns: minmax(150px, 220px) auto auto;
      gap: 6px;
      align-items: center;
      justify-content: end;
    }
    .actions select, .actions button {
      padding: 6px 8px;
      font-size: 12px;
    }
    .actions select {
      width: 220px;
      max-width: 220px;
    }
    .actions button.danger {
      background: var(--danger);
      color: var(--danger-text);
      border-color: #5d2525;
    }
    .actions button.danger:hover {
      border-color: #ff6b6b;
    }
    .busy-mask,
    .modal-mask {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(8, 10, 14, 0.65);
      backdrop-filter: blur(2px);
      z-index: 99;
    }
    .busy-mask.show,
    .modal-mask.show {
      display: flex;
    }
    .busy-card,
    .modal-card {
      width: min(92vw, 460px);
      border-radius: 12px;
      border: 1px solid #2f3a4d;
      background: #121722;
      color: var(--text);
      padding: 16px 16px 14px;
    }
    .busy-card {
      width: auto;
      min-width: 240px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(93, 214, 44, 0.25);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .modal-title {
      margin: 0;
      font-size: 18px;
      color: var(--primary);
    }
    .modal-desc {
      margin: 8px 0 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .modal-fields {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }
    .modal-field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .modal-actions .danger {
      background: var(--danger);
      color: var(--danger-text);
      border-color: #5d2525;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>空来Ai-X日报账号采集器 · 管理中心</h1>
    <div class="status" id="status">就绪</div>
  </div>

  <div class="layout">
    <div class="panel">
      <div class="panel-title-row">
        <h2>集合管理</h2>
        <button id="addPoolInlineBtn" class="create-btn">+ 增加集合</button>
      </div>
      <div class="pool-list" id="poolList"></div>
      <div class="pool-hint">
        行内图标说明：<br />
        `+` 新增账号，`⭳` 导出 JSON，`✎` 改名，`🗑` 删除。
      </div>
    </div>

    <div class="panel">
      <h2 id="currentPoolTitle">账号池</h2>
      <div class="write-diagnostics">
        <div class="write-diagnostics-title">Last DB write</div>
        <div class="write-diagnostics-body" id="writeResult">No write records yet.</div>
      </div>
      <div class="toolbar">
        <input id="searchInput" placeholder="搜索账号名 / handle / 链接" />
        <button id="refreshBtn">刷新数据库</button>
        <button id="importClipboardBtn" class="primary">剪贴板入池</button>
      </div>
      <div class="bulk-toolbar">
        <label class="toggle">
          <input type="checkbox" id="selectAllToggle" />
          全选
        </label>
        <div class="selected-count" id="selectedCount">已选 <strong>0</strong></div>
        <select id="bulkMoveTarget"></select>
        <button id="bulkMoveBtn">批量移动</button>
        <button id="clearSelectionBtn">清空</button>
      </div>
      <div class="account-list" id="accountList"></div>
    </div>
  </div>

  <div class="busy-mask" id="busyMask">
    <div class="busy-card">
      <div class="spinner"></div>
      <div id="busyText">连接数据库中...</div>
    </div>
  </div>

  <div class="modal-mask" id="modalMask">
    <div class="modal-card">
      <h3 class="modal-title" id="modalTitle">标题</h3>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-fields" id="modalFields"></div>
      <div class="modal-actions">
        <button id="modalCancelBtn">取消</button>
        <button id="modalConfirmBtn" class="primary">确认</button>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
