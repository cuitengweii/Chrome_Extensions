<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>空来Ai-X日报账号采集器</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #eef2ff;
      --muted: #98a2b3;
      --line: #2a3140;
      --primary: #5dd62c;
      --primary-hover: #4fbd25;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 370px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .wrap { padding: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }
    h1 {
      margin: 0 0 10px;
      color: var(--primary);
      font-size: 22px;
      font-weight: 700;
    }
    .label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    select, button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #10141c;
      color: var(--text);
      margin-bottom: 8px;
      font-size: 14px;
    }
    select:focus, button:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(93, 214, 44, 0.2);
    }
    button { cursor: pointer; }
    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #07150a;
      font-weight: 700;
    }
    button.primary:hover { background: var(--primary-hover); }
    button:disabled, select:disabled {
      opacity: 0.7;
      cursor: wait;
    }
    .switch {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .hint {
      min-height: 16px;
      margin: -2px 0 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .hint.loading {
      color: var(--primary);
    }
    .status {
      font-size: 12px;
      color: var(--primary);
      min-height: 18px;
      white-space: pre-wrap;
      margin-top: 4px;
    }
    .write-result {
      font-size: 11px;
      color: var(--muted);
      min-height: 16px;
      white-space: pre-wrap;
      margin-top: 6px;
    }
    .write-result.error {
      color: #ff9a9a;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>空来Ai-X日报账号采集器</h1>
      <label class="label" for="pool">当前采集集合</label>
      <select id="pool"></select>
      <div class="hint loading" id="poolHint">Loading collections...</div>
      <button id="fromClipboard" class="primary">从剪贴板导入链接</button>
      <label class="switch">
        <input type="checkbox" id="autoClipboard" />
        自动监听剪贴板（复制链接后自动入池）
      </label>
      <button id="openManager">打开管理中心（集合/账号池）</button>
      <div class="status" id="status"></div>
      <div class="write-result" id="writeResult">Last DB write: none.</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
